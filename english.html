<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中学英語 単語フラッシュカード Premium</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .quiz-container {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            box-sizing: border-box;
            text-align: center;
        }
        h1 {
            font-size: 18px;
            color: #5f6368;
            margin-top: 0;
            margin-bottom: 10px;
            font-weight: normal;
        }
        /* モード切り替えスイッチ */
        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .mode-btn {
            background-color: #f1f3f4;
            color: #3c4043;
            border: 1px solid #dadce0;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        .mode-btn.active {
            background-color: #e8f0fe;
            color: #1a73e8;
            border-color: #1a73e8;
        }
        .progress {
            font-size: 14px;
            color: #80868b;
            margin-bottom: 10px;
        }
        /* カード部分 */
        .card-box {
            background-color: #f8f9fa;
            border: 2px solid #e8f0fe;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }
        /* 問題テキスト */
        .question-text {
            font-size: 24px;
            font-weight: bold;
            color: #202124;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .hint-text {
            font-size: 14px;
            color: #1a73e8;
            background: #e8f0fe;
            padding: 3px 8px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        /* 答えテキスト */
        .answer-text {
            font-size: 28px;
            font-weight: bold;
            color: #d93025;
            border-top: 2px dashed #dadce0;
            padding-top: 15px;
            width: 100%;
            line-height: 1.4;
            /* 最初は隠す */
            visibility: hidden; 
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        /* 答えを表示したときのクラス */
        .card-box.show-answer .answer-text {
            visibility: visible;
            opacity: 1;
        }

        /* ボタンエリア */
        .control-btns {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        button.action-btn {
            border: none;
            border-radius: 8px;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s ease;
            width: 100%;
        }
        .show-btn {
            background-color: #1a73e8;
            color: white;
        }
        .show-btn:hover {
            background-color: #1557b0;
        }
        .next-btn {
            background-color: #f8f9fa;
            color: #3c4043;
            border: 2px solid #dadce0;
            display: none;
        }
        .next-btn:hover {
            background-color: #f1f3f4;
            border-color: #bdc1c6;
        }
        
        /* 結果画面 */
        #result-screen {
            display: none;
        }
        .restart-btn {
            background-color: #1a73e8;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <!-- クイズ（カード）画面 -->
    <div id="game-screen">
        <h1>中学英語 単語カード</h1>
        
        <!-- モード切り替えボタン -->
        <div class="mode-selector">
            <button class="mode-btn active" id="mode-jp-to-en" onclick="changeMode('jp-to-en')">日 ➔ 英</button>
            <button class="mode-btn" id="mode-en-to-jp" onclick="changeMode('en-to-jp')">英 ➔ 日</button>
        </div>

        <div class="progress" id="progress">1 / 15</div>
        
        <!-- カード -->
        <div class="card-box" id="card">
            <div class="question-text" id="question-text">問題</div>
            <div class="hint-text" id="hint-text">[品詞]</div>
            <div class="answer-text" id="answer-text">答え</div>
        </div>

        <!-- 操作ボタン -->
        <div class="control-btns">
            <button class="action-btn show-btn" id="show-btn" onclick="showAnswer()">答えを見る</button>
            <button class="action-btn next-btn" id="next-btn" onclick="nextQuestion()">次へ進む ▶</button>
        </div>
    </div>

    <!-- 結果画面 -->
    <div id="result-screen">
        <div class="question-text">お疲れ様でした！</div>
        <div class="progress">15問の学習が完了しました。</div>
        <button class="action-btn restart-btn" onclick="restartQuiz()">もう一度学習する</button>
    </div>
</div>

let currentQuestions = [];
let currentIdx = 0;
let currentMode = 'jp-to-en'; // デフォルトは「日本語 ➔ 英語」

function startQuiz() {
    // 全データからランダムに15問抽出してシャッフル
    let shuffled = [...wordList].sort(() => 0.5 - Math.random());
    currentQuestions = shuffled.slice(0, 15);
    currentIdx = 0;
    
    document.getElementById("game-screen").style.display = "block";
    document.getElementById("result-screen").style.display = "none";
    
    showQuestion();
}

function showQuestion() {
    document.getElementById("card").classList.remove("show-answer");
    document.getElementById("show-btn").style.display = "block";
    document.getElementById("next-btn").style.display = "none";

    const currentQ = currentQuestions[currentIdx];
    
    document.getElementById("progress").innerText = `${currentIdx + 1} / ${currentQuestions.length}`;
    document.getElementById("hint-text").innerText = `[${currentQ.part}]`;
    
    // モードによって問題と答えを入れ替える
    if (currentMode === 'jp-to-en') {
        document.getElementById("question-text").innerText = currentQ.meaning;
        document.getElementById("answer-text").innerText = currentQ.word;
    } else {
        document.getElementById("question-text").innerText = currentQ.word;
        document.getElementById("answer-text").innerText = currentQ.meaning;
    }
}

function showAnswer() {
    document.getElementById("card").classList.add("show-answer");
    document.getElementById("show-btn").style.display = "none";
    document.getElementById("next-btn").style.display = "block";
}

function nextQuestion() {
    currentIdx++;
    if (currentIdx < currentQuestions.length) {
        showQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById("game-screen").style.display = "none";
    document.getElementById("result-screen").style.display = "block";
}

function restartQuiz() {
    startQuiz();
}

// モード切り替え
function changeMode(mode) {
    if (currentMode === mode) return;
    
    currentMode = mode;
    
    // スイッチの見た目を更新
    document.getElementById("mode-jp-to-en").classList.toggle("active", mode === 'jp-to-en');
    document.getElementById("mode-en-to-jp").classList.toggle("active", mode === 'en-to-jp');
    
    // 現在のセットのまま1問目から再スタート
    startQuiz();
}

window.onload = startQuiz;

</html>
